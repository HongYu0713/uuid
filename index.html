<script>


let uuids="";



function generateUUID(){


let count=
document.getElementById("count").value;


uuids="";


for(let i=0;i<count;i++){

uuids+=crypto.randomUUID()+"\n";

}


document.getElementById("result").innerText=uuids;


}





function copyUUID(){


navigator.clipboard.writeText(uuids);


alert("Copied!");

}



function downloadUUID(){


let blob=
new Blob(
[uuids],
{type:"text/plain"}
);


let url=
URL.createObjectURL(blob);


let a=document.createElement("a");

a.href=url;

a.download="uuid.txt";

a.click();


}
